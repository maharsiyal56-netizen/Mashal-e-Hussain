<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Mashal-e-Hussain | Noha · Majlis · Matam Dari</title>
  <!-- Standard favicon -->
<link rel="icon" href="favicon.png" type="image/png">

<!-- Apple devices ke liye -->
<link rel="apple-touch-icon" href="favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }
    
    body {
      font-family: 'Segoe UI', 'Amiri', sans-serif;
      background-color: #0a0f0c;
      color: #e5e5e5;
      line-height: 1.6;
      overflow-x: hidden;
      width: 100%;
    }
    
    /* Improved Navbar */
    .navbar {
      background: #0a120e;
      padding: clamp(10px, 2vw, 15px) 0;
      border-bottom: 2px solid #d4af37;
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
      background: rgba(10, 18, 14, 0.95);
    }
    
    .nav-container {
      max-width: min(1400px, 95%);
      margin: 0 auto;
      padding: 0 clamp(15px, 3vw, 25px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .logo { 
      font-family: 'Noto Nastaliq Urdu', 'Amiri', serif; 
      font-size: clamp(1.5rem, 4vw, 2.5rem); 
      color: #d4af37; 
      text-decoration: none;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      letter-spacing: 1px;
    }
    
    .nav-links { 
      display: flex; 
      gap: clamp(15px, 3vw, 30px); 
      flex-wrap: wrap; 
      align-items: center;
    }
    
    .nav-links a { 
      color: #efefef; 
      text-decoration: none; 
      font-size: clamp(0.9rem, 2vw, 1.2rem); 
      padding-bottom: 5px; 
      border-bottom: 2px solid transparent;
      transition: all 0.3s ease;
      font-weight: 500;
    }
    
    .nav-links a:hover, 
    .nav-links a.active { 
      color: #d4af37; 
      border-bottom-color: #d4af37; 
      transform: translateY(-2px);
    }

    /* New About Me button style - distinct but harmonious */
    .about-btn {
      background-color: #d4af37;
      color: #0a120e !important;
      padding: 8px 18px !important;
      border-radius: 40px;
      font-weight: 700 !important;
      border: 2px solid #d4af37;
      transition: all 0.3s ease !important;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      margin-left: 5px;
    }

    .about-btn:hover {
      background-color: transparent !important;
      color: #d4af37 !important;
      transform: translateY(-2px) !important;
      border-color: #d4af37;
      box-shadow: 0 6px 12px rgba(212, 175, 55, 0.4);
    }
    
    /* Enhanced Hero Section — description removed, only overlay + title */
    .hero {
      position: relative;
      text-align: center;
      padding: clamp(40px, 8vw, 100px) clamp(15px, 4vw, 40px);
      margin: clamp(15px, 3vw, 30px) clamp(10px, 3vw, 20px) clamp(30px, 5vw, 50px);
      border-radius: clamp(20px, 5vw, 40px);
      overflow: hidden;
      isolation: isolate;
      min-height: clamp(300px, 50vh, 600px);
      background-color: #1a2a1a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .slideshow-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
    }
    
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }
    
    .slide.active {
      opacity: 1;
      z-index: 1;
    }
    
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.8) 100%);
      z-index: -1;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      color: #d4af37;
      margin-bottom: clamp(10px, 3vh, 30px);
      text-shadow: 3px 3px 0 #1a2e1a, 5px 5px 10px rgba(0,0,0,0.5);
      font-family: 'Noto Nastaliq Urdu', 'Amiri', serif;
      position: relative;
      z-index: 2;
      line-height: 1.2;
    }
    
    /* Enhanced Social Hub */
    .social-hub {
      max-width: min(1400px, 95%);
      margin: 0 auto clamp(30px, 5vw, 60px);
      padding: 0 clamp(15px, 3vw, 25px);
    }
    
    .social-hub h2 {
      text-align: center;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      color: #d4af37;
      margin-bottom: clamp(20px, 4vh, 40px);
      border-bottom: 3px dashed #b49450;
      padding-bottom: clamp(10px, 2vh, 20px);
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .social-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(200px, 100%), 1fr));
      gap: clamp(15px, 3vw, 30px);
    }
    
    .social-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(15px, 3vh, 25px);
      padding: clamp(25px, 5vw, 50px) clamp(10px, 3vw, 20px);
      text-align: center;
      background: linear-gradient(145deg, #16261e, #1a2e22);
      border: 2px solid #3e5f4b;
      border-radius: clamp(20px, 4vw, 40px);
      text-decoration: none;
      color: white;
      box-shadow: 0 10px 0 #0a2f1f, 0 5px 20px rgba(0,0,0,0.3);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      min-height: clamp(180px, 30vh, 280px);
    }
    
    .social-card i { 
      font-size: clamp(3rem, 8vw, 6rem); 
      color: #d4af37;
      filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
    }
    
    .social-card span {
      font-size: clamp(1.2rem, 4vw, 2.2rem);
      font-weight: 700;
      background: #d4af37;
      color: #0a2f1f;
      padding: clamp(8px, 2vh, 12px) clamp(15px, 4vw, 30px);
      border-radius: 60px;
      width: 100%;
      box-shadow: inset 0 -3px 0 #8b691b;
      letter-spacing: 1px;
    }
    
    .social-card:hover {
      transform: translateY(-15px);
      background: linear-gradient(145deg, #1f3d2c, #234231);
      box-shadow: 0 15px 0 #8b691b, 0 10px 30px rgba(212, 175, 55, 0.3);
      border-color: #d4af37;
    }
    
    .social-card:active {
      transform: translateY(-5px);
      box-shadow: 0 8px 0 #8b691b;
    }
    
    /* Enhanced Footer */
    .footer {
      background: linear-gradient(180deg, #07120b, #0a1a0f);
      padding: clamp(30px, 5vw, 50px) 0 clamp(15px, 3vw, 20px);
      margin-top: clamp(40px, 8vh, 80px);
      border-top: 4px solid #d4af37;
      text-align: center;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
    }
    
    .social-icons { 
      display: flex; 
      justify-content: center; 
      gap: clamp(20px, 5vw, 40px); 
      margin-bottom: clamp(15px, 3vh, 30px); 
      flex-wrap: wrap;
    }
    
    .social-icons a { 
      color: #d4af37; 
      font-size: clamp(2rem, 5vw, 3rem);
      transition: all 0.3s ease;
      filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
    }
    
    .social-icons a:hover {
      transform: translateY(-5px) scale(1.1);
      color: #ffd700;
    }
    
    .footer p {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: #a0a0a0;
      max-width: 90%;
      margin: 0 auto;
    }
    
    /* TV & Large Screen Optimization */
    @media (min-width: 1920px) {
      html {
        font-size: 20px;
      }
      
      .nav-container,
      .social-hub {
        max-width: 1800px;
      }
      
      .hero {
        min-height: 70vh;
      }
      
      .social-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
    
    /* Tablet Optimization */
    @media (min-width: 768px) and (max-width: 1024px) {
      .hero {
        min-height: 400px;
      }
      
      .social-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    /* Mobile Landscape Optimization */
    @media (max-width: 768px) and (orientation: landscape) {
      .hero {
        min-height: 300px;
        padding: 30px 15px;
      }
      
      .social-card {
        min-height: 150px;
        flex-direction: row;
        padding: 20px;
      }
      
      .social-card i {
        font-size: 2.5rem;
      }
      
      .social-card span {
        width: auto;
        font-size: 1.5rem;
      }
    }
    
    /* Small Mobile Optimization */
    @media (max-width: 480px) {
      .nav-links {
        justify-content: center;
        width: 100%;
      }
      
      .nav-links a {
        font-size: 0.9rem;
        padding: 5px 8px;
      }
      
      .about-btn {
        padding: 5px 12px !important;
        font-size: 0.9rem !important;
      }

      .social-card {
        padding: 20px 10px;
      }
      
      .social-card i {
        font-size: 2.8rem;
      }
      
      .social-card span {
        font-size: 1.2rem;
        padding: 6px 15px;
      }
      
      .hero h1 {
        word-break: break-word;
      }
    }
    
    /* Ultra Small Devices */
    @media (max-width: 320px) {
      .nav-links {
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      
      .social-grid {
        grid-template-columns: 1fr;
      }
    }
    
    /* High Resolution TV */
    @media (min-width: 2560px) {
      html {
        font-size: 24px;
      }
      
      .hero {
        min-height: 600px;
      }
    }
    
    /* Print Styles */
    @media print {
      .navbar, .footer, .social-card {
        display: none;
      }
      
      body {
        background: white;
        color: black;
      }
    }
    
    /* Smooth Loading Animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .hero, .social-hub {
      animation: fadeIn 1s ease-out;
    }
    
    /* Loading State for Images */
    .slide {
      background-color: #1a2a1a;
      background-size: cover;
    }
  </style>
</head>

  <script>
    // Enhanced Slideshow with Error Handling
    document.addEventListener('DOMContentLoaded', function() {
      const slides = document.querySelectorAll('.slide');
      
      if (slides.length <= 1) return;

      let currentIndex = 0;
      
      // پہلی سلائیڈ کو ایکٹو کریں
      slides.forEach((slide, index) => {
        if (index === 0) slide.classList.add('active');
        else slide.classList.remove('active');
      });

      // سلائیڈ شو شروع کریں
      setInterval(function() {
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % slides.length;
        slides[currentIndex].classList.add('active');
      }, 5000);
      
      // Image Error Handling
      slides.forEach(slide => {
        const img = new Image();
        // extract URL from background-image: url('...')
        const bg = slide.style.backgroundImage;
        if (bg && bg !== 'none') {
          const url = bg.slice(5, -2).replace(/['"]/g, '');
          img.src = url;
          img.onerror = function() {
            slide.style.backgroundColor = '#1a2a1a';
            console.log('Image failed to load:', this.src);
          };
        }
      });
    });
  </script>
