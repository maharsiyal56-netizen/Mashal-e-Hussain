<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Admin Contact - Mashal-e-Hussain</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23d4af37'>🕋</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.2s; }
    body {
      font-family: 'Segoe UI', 'Amiri', sans-serif;
      background-color: #0a0f0c;
      color: #e5e5e5;
      line-height: 1.6;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.05"><path d="M60 40 L140 40 L160 80 L140 120 L60 120 L40 80 L60 40" fill="none" stroke="%23d4af37" stroke-width="1.5"/><circle cx="100" cy="80" r="12" fill="none" stroke="%23d4af37" stroke-width="1"/><path d="M70 150 Q100 170 130 150" stroke="%23d4af37" fill="none" stroke-width="1.2"/></svg>');
      background-repeat: repeat;
    }
    .navbar {
      background: #0a120e;
      padding: 15px 0;
      border-bottom: 2px solid #d4af37;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    .logo { 
      font-family: 'Amiri', serif; 
      font-size: clamp(1.8rem, 5vw, 2.5rem); 
      color: #d4af37; 
      text-decoration: none; 
    }
    .nav-links { 
      display: flex; 
      gap: clamp(15px, 3vw, 30px); 
      flex-wrap: wrap; 
    }
    .nav-links a { 
      color: #efefef; 
      text-decoration: none; 
      font-size: clamp(1rem, 2.5vw, 1.2rem); 
      padding: 8px 0 5px; 
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    .nav-links a:hover, .nav-links a.active { 
      color: #d4af37; 
      border-bottom-color: #d4af37; 
    }
    
    .container { 
      max-width: 1400px; 
      margin: 40px auto; 
      padding: 0 20px; 
      width: 100%;
    }
    .page-header {
      text-align: center;
      margin-bottom: 50px;
    }
    .page-header h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      color: #d4af37;
      font-family: 'Noto Nastaliq Urdu', serif;
      margin-bottom: 15px;
      line-height: 1.2;
    }
    .page-header p {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      color: #ccc;
    }
    
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      margin-bottom: 50px;
    }
    
    .admin-card {
      background: #16261e;
      border: 2px solid #3e5f4b;
      border-radius: 30px;
      padding: clamp(25px, 5vw, 40px);
      text-align: center;
      box-shadow: 0 10px 0 #0a2f1f;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .admin-card i {
      font-size: clamp(3rem, 8vw, 4.5rem);
      color: #d4af37;
      margin-bottom: 20px;
    }
    .admin-card h2 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      color: #d4af37;
      margin-bottom: 25px;
      border-bottom: 1px dashed #b49450;
      padding-bottom: 10px;
    }
    .admin-card p {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      margin: 12px 0;
      word-break: break-word;
    }
    .admin-card a {
      color: #d4af37;
      text-decoration: none;
      font-weight: bold;
      border-bottom: 1px dotted;
      padding: 5px 0;
      display: inline-block;
    }
    
    .contact-form {
      background: #1a2c21;
      border-radius: 40px;
      padding: clamp(30px, 6vw, 50px);
      border: 2px solid #d4af37;
      margin-top: 40px;
    }
    .contact-form h3 {
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      color: #d4af37;
      margin-bottom: 30px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 25px;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 15px 20px;
      background: #0e1f15;
      border: 2px solid #3e5f4b;
      border-radius: 50px;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: white;
    }
    .form-group textarea {
      border-radius: 30px;
      resize: vertical;
      min-height: 120px;
    }
    .form-group button {
      background: #d4af37;
      color: #0a2f1f;
      border: none;
      padding: 15px 40px;
      font-size: clamp(1.2rem, 3vw, 1.5rem);
      font-weight: bold;
      border-radius: 60px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      width: 100%;
      max-width: 300px;
      margin: 0 auto;
      display: block;
    }
    .form-group button:hover {
      transform: scale(1.05);
      background: #e5c158;
    }
    .form-group button:active {
      transform: scale(0.95);
    }
    
    .footer {
      background: #07120b;
      padding: 40px 0 20px;
      margin-top: 60px;
      border-top: 3px solid #d4af37;
      text-align: center;
    }
    .social-icons { 
      display: flex; 
      justify-content: center; 
      gap: clamp(20px, 5vw, 40px); 
      margin-bottom: 20px; 
      flex-wrap: wrap;
    }
    .social-icons a { 
      color: #d4af37; 
      font-size: clamp(2rem, 6vw, 3rem); 
      transition: transform 0.2s;
    }
    .social-icons a:hover {
      transform: translateY(-5px);
    }
    
    /* Tablet specific adjustments */
    @media (min-width: 768px) and (max-width: 1024px) {
      .container {
        max-width: 90%;
      }
      .admin-card p {
        font-size: 1.1rem;
      }
    }
    
    /* TV and large screens */
    @media (min-width: 1920px) {
      .container {
        max-width: 1800px;
      }
      body {
        font-size: 1.2rem;
      }
      .admin-card {
        padding: 50px;
      }
    }
    
    /* Small mobile screens */
    @media (max-width: 480px) {
      .nav-container {
        justify-content: center;
        text-align: center;
      }
      .nav-links {
        justify-content: center;
      }
      .nav-links a {
        white-space: normal;
        font-size: 0.95rem;
      }
      .admin-card {
        padding: 20px;
      }
      .form-group button {
        max-width: 100%;
      }
    }
    
    /* Touch device optimization */
    @media (hover: none) and (pointer: coarse) {
      .nav-links a,
      .admin-card a,
      .social-icons a,
      button {
        padding: 12px 0;
        min-height: 44px;
        min-width: 44px;
      }
    }
    
    /* Print styles */
    @media print {
      .navbar, .footer, .contact-form {
        display: none;
      }
    }
  </style>
</head>
