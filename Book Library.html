  <!-- JavaScript (updated to handle cover images properly) -->
  <script>
    (function() {
      const library = document.getElementById('libraryContainer');
      const detailPage = document.getElementById('bookDetail');
      const backLink = document.getElementById('backToLibrary');
      
      const detailCoverImg = document.getElementById('detailCoverImg');
      const detailCoverContainer = document.getElementById('detailCoverContainer');
      const detailTitle = document.getElementById('detailTitle');
      const detailFullTitle = document.getElementById('detailFullTitle');
      const detailAuthor = document.getElementById('detailAuthor');
      const detailLang = document.getElementById('detailLang');
      const detailSubject = document.getElementById('detailSubject');
      const detailDesc = document.getElementById('detailDesc');
      const detailTags = document.getElementById('detailTags');
      const readPdfBtn = document.getElementById('readPdfBtn');

      document.querySelectorAll('.read-detail-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          const card = this.closest('.book-card');
          if (!card) return;

          const title = card.dataset.title || 'Untitled';
          const author = card.dataset.author || 'Unknown';
          const lang = card.dataset.lang || 'Urdu';
          const subject = card.dataset.subject || 'General';
          const tagsRaw = card.dataset.tags || 'Islam';
          const desc = card.dataset.desc || 'No description available.';
          
          // Get the image source from the card's img element
          const cardImg = card.querySelector('.book-front img');
          let imgSrc = '';
          if (cardImg) {
            imgSrc = cardImg.src;
          }
          
          const pdfLink = card.querySelector('a.btn') ? card.querySelector('a.btn').getAttribute('href') : '#';

          // Clear previous content and set new image
          detailCoverContainer.innerHTML = ''; // Clear container
          const newImg = document.createElement('img');
          newImg.id = 'detailCoverImg';
          newImg.alt = 'cover';
          
          if (imgSrc) {
            newImg.src = imgSrc;
            newImg.onerror = function() {
              this.style.display = 'none';
              detailCoverContainer.innerHTML = '<i class="fas fa-book-open" style="font-size:8rem; color:#d4af37;"></i>';
            };
            detailCoverContainer.appendChild(newImg);
          } else {
            detailCoverContainer.innerHTML = '<i class="fas fa-book-open" style="font-size:8rem; color:#d4af37;"></i>';
          }

          detailTitle.innerText = title;
          detailFullTitle.innerText = title;
          detailAuthor.innerText = author;
          detailLang.innerText = lang;
          detailSubject.innerText = subject;
          detailDesc.innerText = desc;

          const tagsArray = tagsRaw.split(',').map(t => t.trim());
          detailTags.innerHTML = '';
          tagsArray.forEach(t => {
            if (t) {
              const span = document.createElement('span');
              span.className = 'tag';
              span.innerText = t;
              detailTags.appendChild(span);
            }
          });

          readPdfBtn.href = pdfLink;

          library.style.display = 'none';
          detailPage.classList.add('active-detail');
        });
      });

      backLink.addEventListener('click', function(e) {
        e.preventDefault();
        library.style.display = 'block';
        detailPage.classList.remove('active-detail');
      });

      detailPage.classList.remove('active-detail');
      library.style.display = 'block';
    })();
  </script>
